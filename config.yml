# 短视频/内容平台热点日报配置（面向娱乐/舞蹈/游戏自媒体创作者）
#
# hot_sources: 要采集的平台/分区列表
#   - id:           报告文件名 slug (生成 ai-<id>.md)
#   - platform:     DailyHotApi 端点名 (如 douyin / bilibili / kuaishou)
#   - name:         显示名 (中文)
#   - type:         可选，分区参数 (bilibili 排行榜分区: 3音乐/4游戏/5娱乐/119鬼畜/129舞蹈)
#   - limit:        拉取条数上限
#   - contentType:  数据类型 "keywords"(热搜词) | "videos"(视频/内容)
#   - report:       可选，是否生成独立源报告 (默认 true；false = 只采集喂给专项聚合)
#   - tags:         可选，来源先验标签 (该源全部条目预置的娱乐标签，跳过逐条分类)
#
# 数据来源: imsyy/DailyHotApi 自部署实例
#   环境变量 DAILYHOT_BASE_URL 指向你的部署地址
#   ⚠️ 新增源上线前建议先 curl 实测端点可用性与字段结构（见 IMPROVEMENT.md 1.4）

hot_sources:
  # ── 综合源（保留独立源报告）──
  - id: douyin
    platform: douyin
    name: 抖音热搜
    limit: 50
    contentType: keywords

  - id: bili
    platform: bilibili
    name: B站热门视频
    limit: 50
    contentType: videos

  # ── 垂类源（只采集，喂给专项报告聚合，不出独立源报告）──
  - id: bili-music
    platform: bilibili
    name: B站热门音乐
    type: "3"
    limit: 30
    contentType: videos
    report: false
    tags: [bgm]

  - id: bili-dance
    platform: bilibili
    name: B站舞蹈区
    type: "129"
    limit: 30
    contentType: videos
    report: false
    tags: [dance]

  - id: bili-game
    platform: bilibili
    name: B站游戏区
    type: "4"
    limit: 30
    contentType: videos
    report: false
    tags: [game]

  - id: bili-guichu
    platform: bilibili
    name: B站鬼畜区
    type: "119"
    limit: 30
    contentType: videos
    report: false
    tags: [meme]

  - id: bili-ent
    platform: bilibili
    name: B站娱乐区
    type: "5"
    limit: 30
    contentType: videos
    report: false
    tags: [fandom]

  - id: weibo
    platform: weibo
    name: 微博热搜
    limit: 50
    contentType: keywords
    report: false

  - id: kuaishou
    platform: kuaishou
    name: 快手热榜
    limit: 50
    contentType: keywords
    report: false

  # ── 游戏官方动态（公告性质，无热度值，limit 宜小）──
  - id: genshin
    platform: genshin
    name: 原神动态
    limit: 15
    contentType: keywords
    report: false
    tags: [game]

  - id: starrail
    platform: starrail
    name: 星穹铁道动态
    limit: 15
    contentType: keywords
    report: false
    tags: [game]

  - id: miyoushe
    platform: miyoushe
    name: 米游社热点
    limit: 20
    contentType: keywords
    report: false
    tags: [game]

