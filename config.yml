# 创作者画像（P5 推送分流）
#   cares:              关心的娱乐标签，推送时只保留对应专项报告
#   feishu_webhook_env: 该画像的飞书 webhook 环境变量名（GitHub Secrets 配置实际 URL；未配置则静默跳过）
creator_profiles:
  - id: dance_creator
    name: 舞蹈博主
    cares: [bgm, dance]
    feishu_webhook_env: FEISHU_WEBHOOK_DANCE

  - id: game_streamer
    name: 游戏博主
    cares: [game, meme]
    feishu_webhook_env: FEISHU_WEBHOOK_GAME

  - id: entertainment_blogger
    name: 娱乐博主
    cares: [meme, fandom, bgm]
    feishu_webhook_env: FEISHU_WEBHOOK_ENT

# LLM 推荐系统配置 (预留)
recommend:
  top_k: 5
  weights:
    popularity: 0.5
    recency: 0.3
    relevance: 0.2
