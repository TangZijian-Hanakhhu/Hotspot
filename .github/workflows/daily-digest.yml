name: Daily Popular Radar

on:
  schedule:
    # 每天 00:00 UTC = 08:00 CST (UTC+8)
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest
    # DailyHotApi fetch + 6 LLM calls typically finish in 2-4 min.
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run daily digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_PROVIDER: volcano
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          ARK_MODEL: ${{ secrets.ARK_MODEL }}
          DAILYHOT_BASE_URL: ${{ secrets.DAILYHOT_BASE_URL }}
          DIGEST_REPO: ${{ github.repository }}
        run: pnpm start

      - name: Commit digest files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          if git diff --cached --quiet; then
            echo "No new digest files to commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "digest: ${DATE} daily digest"
            git pull --rebase
            git push
          fi

      - name: Update web manifest
        run: pnpm manifest

      - name: Commit manifest and feed
        run: |
          git add manifest.json feed.xml
          if ! git diff --cached --quiet; then
            git commit -m "chore: update manifest.json"
            git pull --rebase
            git push
          fi

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || '@popular_radar' }}
          PAGES_URL: https://tangzijian-hanakhhu.github.io/Hotspot
        run: pnpm notify

      - name: Send Feishu notification
        env:
          FEISHU_WEBHOOK_URLS: ${{ secrets.FEISHU_WEBHOOK_URLS }}
          # 创作者画像分流 webhook（未配置的画像静默跳过）
          FEISHU_WEBHOOK_DANCE: ${{ secrets.FEISHU_WEBHOOK_DANCE }}
          FEISHU_WEBHOOK_GAME: ${{ secrets.FEISHU_WEBHOOK_GAME }}
          FEISHU_WEBHOOK_ENT: ${{ secrets.FEISHU_WEBHOOK_ENT }}
          PAGES_URL: https://tangzijian-hanakhhu.github.io/Hotspot
        run: pnpm notify:feishu

      - name: Close stale issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGEST_REPO: ${{ github.repository }}
        run: pnpm close-stale
